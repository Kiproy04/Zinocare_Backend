components:
  schemas:
    Animal:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          nullable: true
          maxLength: 100
        species:
          $ref: '#/components/schemas/SpeciesEnum'
        mkulima:
          type: string
          format: uuid
        breed:
          type: string
          nullable: true
          maxLength: 100
        sex:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SexEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        date_of_birth:
          type: string
          format: date
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - mkulima
      - species
    AnimalRequest:
      type: object
      properties:
        name:
          type: string
          nullable: true
          maxLength: 100
        species:
          $ref: '#/components/schemas/SpeciesEnum'
        mkulima:
          type: string
          format: uuid
        breed:
          type: string
          nullable: true
          maxLength: 100
        sex:
          nullable: true
          oneOf:
          - $ref: '#/components/schemas/SexEnum'
          - $ref: '#/components/schemas/BlankEnum'
          - $ref: '#/components/schemas/NullEnum'
        date_of_birth:
          type: string
          format: date
          nullable: true
      required:
      - mkulima
      - species
    BlankEnum:
      enum:
      - ''
    ChannelEnum:
      enum:
      - SMS
      - EMAIL
      - PUSH
      type: string
      description: |-
        * `SMS` - SMS
        * `EMAIL` - Email
        * `PUSH` - Push Notification
    ConsultationCancel:
      type: object

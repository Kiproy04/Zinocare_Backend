openapi: 3.0.3
info:
  title: Zinocare API
  version: 1.0.0
  description: Livestock management platform for farmers (Mkulima) and vets
paths:
  /api/accounts/login/:
    post:
      operationId: accounts_login_create
      description: |-
        Takes a set of user credentials and returns an access and refresh JSON web
        token pair to prove the authentication of those credentials.
      tags:
      - accounts
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginTokenObtainPairRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginTokenObtainPairRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/LoginTokenObtainPairRequest'
        required: true
      responses:
        '200':
          description: No response body
  /api/accounts/logout/:
